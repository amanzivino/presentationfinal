<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album Continuity — A Magnum Opus</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%2309080b'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Georgia,serif' font-size='26' fill='%23ede9e1'%3EAC%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Grotesk:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09080b; --bg2: #0f0d12;
      --text: #ede9e1; --muted: #7a7570; --faint: #2a2730; --rule: #1e1c22;
      --amber: oklch(0.68 0.15 40); --amberD: oklch(0.48 0.12 40);
      --blue: oklch(0.65 0.14 234); --blueD: oklch(0.42 0.11 234);
      --lh: 1.72;
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-u: 'Space Grotesk', system-ui, sans-serif;
      --font-m: 'DM Mono', monospace;
    }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: var(--font-u); background: var(--bg); color: var(--text); font-size: 1rem; line-height: var(--lh); }
    body.hi-contrast { --muted: #c8c4bc; --faint: #3a3840; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--faint); }
    a { color: inherit; text-decoration: none; }

    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9000; display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; transition: background 0.3s, border-color 0.3s; border-bottom: 1px solid transparent; }
    .nav.stuck { background: rgba(9,8,11,0.94); backdrop-filter: blur(16px); border-color: var(--rule); }
    .nav-logo { font-family: var(--font-d); font-size: 1.125em; font-weight: 700; cursor: pointer; background: none; border: none; color: var(--text); }
    .nav-links { display: flex; gap: 20px; }
    .nav-btn { font-size: 0.7em; letter-spacing: 0.2em; text-transform: uppercase; background: none; border: none; font-family: var(--font-u); color: var(--muted); cursor: pointer; padding: 0; transition: color 0.2s; }
    .nav-btn:hover, .nav-btn.on { color: var(--text); }

    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 100px 40px 56px; }
    .hero.hero-narrow { min-height: 100vh; padding: 100px 40px 80px; justify-content: flex-start; }
    .albums-intro { min-height: 100vh; padding: 80px 40px; border-top: 1px solid var(--rule); display: flex; flex-direction: column; justify-content: center; }
    .albums-intro-eye { font-size: 0.7em; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .albums-intro-title { font-family: var(--font-d); font-size: clamp(28px,4vw,46px); font-weight: 600; font-style: italic; color: var(--text); line-height: 1.15; margin-bottom: 36px; max-width: 720px; }
    .hero-kicker { font-size: 0.7em; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .hero-magnum { font-family: var(--font-d); font-size: clamp(13px,1.4vw,18px); font-style: italic; color: var(--muted); margin-bottom: 28px; letter-spacing: 0.04em; }
    .hero-title { font-family: var(--font-d); font-size: clamp(60px,13vw,190px); font-weight: 700; line-height: 0.88; letter-spacing: -0.02em; margin-bottom: 36px; }
    .hero-rule { border: none; border-top: 1px solid var(--rule); margin-bottom: 28px; }
    .hero-thesis { font-size: clamp(0.8125em,1.5vw,1.0625em); line-height: 1.8; color: var(--muted); max-width: 620px; margin-bottom: 56px; }
    .hero-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); }
    .hero-card { background: var(--bg); padding: 30px 36px 26px; cursor: pointer; transition: background 0.2s; position: relative; }
    .hero-card:hover { background: var(--bg2); }
    .hero-card-eye { font-size: 0.65em; letter-spacing: 0.24em; text-transform: uppercase; margin-bottom: 12px; }
    .hero-card.a .hero-card-eye { color: var(--amberD); }
    .hero-card.b .hero-card-eye { color: var(--blueD); }
    .hero-card-title { font-family: var(--font-d); font-size: 2.2em; font-weight: 600; line-height: 1.1; margin-bottom: 6px; display: block; text-decoration: underline; text-decoration-color: transparent; text-underline-offset: 4px; transition: text-decoration-color 0.2s, opacity 0.2s; }
    .hero-card-title:hover { opacity: 0.8; text-decoration-color: currentColor; }
    .hero-card.a .hero-card-title { color: var(--amber); }
    .hero-card.b .hero-card-title { color: var(--blue); font-style: italic; }
    .hero-card-sub { font-size: 0.7em; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
    .hero-card-arrow { position: absolute; bottom: 26px; right: 32px; font-size: 1em; color: var(--faint); }

    .sec-head { padding: 72px 40px 32px; border-bottom: 1px solid var(--rule); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .sec-title { font-family: var(--font-d); font-size: clamp(34px,6vw,78px); font-weight: 700; line-height: 0.9; }
    .sec-title.a { color: var(--amber); }
    .sec-title.b { color: var(--blue); font-style: italic; }
    .sec-right { text-align: right; }
    .sec-label { font-size: 0.65em; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
    .sec-meta { font-family: var(--font-m); font-size: 0.75em; color: var(--muted); display: block; margin-bottom: 10px; }
    .spotify-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.7em; letter-spacing: 0.16em; text-transform: uppercase; padding: 5px 12px; transition: background 0.2s, border-color 0.2s, color 0.2s; }
    .spotify-link.a { color: var(--amber); border: 1px solid var(--amberD); }
    .spotify-link.a:hover { background: rgba(192,120,48,0.1); }
    .spotify-link.b { color: var(--blue); border: 1px solid var(--blueD); }
    .spotify-link.b:hover { background: rgba(122,184,255,0.1); }

    .editorial { padding: 0 60px 80px; }
    .ed-intro { padding: 36px 0 32px; max-width: 560px; }
    .ed-intro-label { font-size: 0.7em; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .ed-intro-text { font-size: 0.925em; line-height: 1.78; color: var(--muted); }

    .char-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 18px; background: transparent; border: none; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 16px 0; cursor: pointer; text-align: left; color: var(--text); }
    .char-toggle:hover { background: var(--bg2); }
    .char-toggle-title { font-family: var(--font-d); font-size: 1.5em; font-weight: 600; color: var(--amber); }
    .char-toggle-sub { font-size: 0.65em; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
    .char-toggle-mark { font-size: 1.125em; color: var(--muted); flex-shrink: 0; }
    .char-list { border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); margin-bottom: 8px; }
    .char-row { display: grid; grid-template-columns: 1fr 1.4fr; gap: 20px; padding: 16px 0; border-bottom: 1px solid var(--rule); }
    .char-row:last-child { border-bottom: none; }
    .char-name { font-family: var(--font-d); font-size: 1.375em; font-weight: 600; color: var(--amber); }
    .char-role { font-size: 0.65em; letter-spacing: 0.18em; text-transform: uppercase; color: var(--amberD); margin-top: 4px; }
    .char-desc { font-size: 0.875em; line-height: 1.75; color: var(--muted); }

    .stage-divider { display: flex; align-items: center; gap: 16px; padding: 20px 0; border-top: 1px solid var(--rule); }
    .stage-divider-num { font-family: var(--font-m); font-size: 0.7em; color: var(--rule); }
    .stage-divider-name { font-size: 0.7em; letter-spacing: 0.28em; text-transform: uppercase; color: var(--amberD); }
    .stage-divider-line { flex: 1; height: 1px; background: var(--rule); }

    .track-item { border-bottom: 1px solid var(--rule); }
    .track-top { display: grid; grid-template-columns: 44px 1fr auto; gap: 20px; padding: 20px 60px; cursor: pointer; align-items: start; transition: background 0.18s; margin: 0 -60px; }
    .track-top:hover { background: var(--bg2); }
    .track-num { font-family: var(--font-m); font-size: 0.75em; color: var(--rule); padding-top: 5px; }
    .track-name-link { font-family: var(--font-d); font-size: 1.3125em; font-weight: 600; line-height: 1.15; color: var(--text); border-bottom: 1px solid transparent; transition: color 0.2s; }
    .track-name-link:hover { color: var(--amber); border-bottom-color: var(--amberD); }
    .track-short { font-size: 0.875em; line-height: 1.65; color: var(--muted); margin-top: 6px; }
    .track-badge { font-size: 0.6em; letter-spacing: 0.2em; text-transform: uppercase; padding: 3px 9px; border: 1px solid var(--amberD); color: var(--amber); white-space: nowrap; margin-top: 5px; }
    .track-toggle { font-size: 0.875em; color: var(--faint); align-self: center; flex-shrink: 0; }
    .track-expand { padding: 0 0 28px 64px; }
    .clip-btn { font-size: 0.65em; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 11px; border: 1px solid var(--rule); background: transparent; color: var(--muted); cursor: pointer; font-family: var(--font-u); margin-bottom: 12px; }
    .clip-btn:hover:not(:disabled) { border-color: var(--amberD); color: var(--amber); }
    .clip-btn.playing { border-color: var(--amberD); color: var(--amber); }
    .clip-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .lyric-quote { border-left: 2px solid var(--amberD); padding: 10px 0 10px 18px; margin-bottom: 16px; }
    .lyric-text { font-family: var(--font-d); font-size: 1.05em; font-style: italic; line-height: 1.55; color: oklch(0.78 0.06 50); white-space: pre-line; }
    .track-analysis { font-size: 0.875em; line-height: 1.75; color: var(--muted); }

    .map-chapter { margin-top: 42px; border-top: 1px solid var(--rule); padding-top: 30px; }
    .map-chapter-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .map-chapter-title { font-family: var(--font-d); font-size: 1.75em; font-weight: 600; color: var(--amber); }
    .map-chapter-sub { font-size: 0.7em; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .map-wrap { position: relative; width: 100%; height: 68vh; }
    #compton-map { width: 100%; height: 100%; display: block; }
    .map-pin-label { pointer-events: none; }
    .map-pin-label-inner { width: 132px; padding: 6px 8px; background: rgba(9,8,11,0.9); border: 1px solid rgba(192,120,48,0.45); color: var(--text); font-family: var(--font-u); box-shadow: 0 8px 20px rgba(0,0,0,0.32); }
    .map-pin-label-track { display: block; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amberD); margin-bottom: 2px; }
    .map-pin-label-name { display: block; font-size: 10px; line-height: 1.25; color: oklch(0.78 0.08 40); }
    .loc-panel { background: #1a181d; border-top: 1px solid var(--rule); padding: 24px 40px; display: grid; grid-template-columns: 52px 1fr; gap: 20px; align-items: start; }
    .loc-n { font-family: var(--font-m); font-size: 1.75em; color: var(--amberD); line-height: 1; }
    .loc-name { font-family: var(--font-d); font-size: 1.25em; font-weight: 600; color: var(--amber); margin-bottom: 3px; }
    .loc-track { font-size: 0.7em; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .loc-body { font-size: 0.875em; line-height: 1.7; color: var(--muted); }
    .loc-hint { padding: 16px 40px; border-top: 1px solid var(--rule); background: var(--bg2); font-size: 0.7em; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); }

    .framework { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--rule); }
    .fw-cell { background: var(--bg); padding: 22px 18px; }
    .fw-label { font-size: 0.65em; letter-spacing: 0.22em; text-transform: uppercase; color: var(--blueD); margin-bottom: 8px; }
    .fw-desc { font-size: 0.825em; line-height: 1.65; color: var(--muted); }
    .cortex-item { border-bottom: 1px solid var(--rule); margin: 0 40px; }
    .cortex-top { display: grid; grid-template-columns: 60px 1fr auto; gap: 24px; padding: 24px 0; cursor: pointer; align-items: start; transition: background 0.18s; }
    .cortex-top:hover { background: var(--bg2); }
    .cortex-num { font-family: var(--font-d); font-size: 1.875em; font-weight: 600; color: oklch(0.25 0.06 234); line-height: 1; }
    .cortex-name-link { font-family: var(--font-d); font-size: 1.3125em; font-style: italic; font-weight: 600; border-bottom: 1px solid transparent; transition: color 0.2s; }
    .cortex-name-link:hover { color: var(--blue); border-bottom-color: var(--blueD); }
    .cortex-role { font-size: 0.65em; letter-spacing: 0.18em; text-transform: uppercase; color: var(--blueD); margin-top: 4px; }
    .cortex-short { font-size: 0.875em; line-height: 1.65; color: var(--muted); margin-top: 8px; }
    .cortex-badge { font-size: 0.6em; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 10px; border: 1px solid var(--blueD); color: var(--blue); white-space: nowrap; align-self: start; margin-top: 4px; }
    .cortex-expand { padding: 0 0 24px 84px; font-size: 0.875em; line-height: 1.75; color: var(--muted); }

    .bridge { padding: 96px 40px 80px; }
    .bridge-kicker { font-size: 0.7em; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
    .bridge-title { font-family: var(--font-d); font-size: clamp(38px,7vw,92px); font-weight: 700; line-height: 0.9; margin-bottom: 36px; }
    .bridge-body { font-size: 1em; line-height: 1.82; color: var(--muted); max-width: 600px; margin-bottom: 64px; }
    .bridge-cols { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 48px; margin-bottom: 60px; }
    .bridge-divider { background: var(--rule); }
    .bridge-col-eye { font-size: 0.65em; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 14px; }
    .b-col-a .bridge-col-eye { color: var(--amberD); }
    .b-col-b .bridge-col-eye { color: var(--blueD); }
    .bridge-col-title { font-family: var(--font-d); font-size: 1.5em; font-weight: 600; margin-bottom: 5px; }
    .b-col-a .bridge-col-title { color: var(--amber); }
    .b-col-b .bridge-col-title { color: var(--blue); font-style: italic; }
    .bridge-col-mode { font-size: 0.7em; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 26px; }
    .bridge-el { padding: 14px 0; border-bottom: 1px solid var(--rule); }
    .bridge-el-lbl { font-size: 0.65em; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px; }
    .b-col-a .bridge-el-lbl { color: var(--amberD); }
    .b-col-b .bridge-el-lbl { color: var(--blueD); }
    .bridge-el-desc { font-size: 0.875em; line-height: 1.7; color: var(--muted); }
    .bridge-coda { border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 44px 0; margin-bottom: 44px; }
    .bridge-coda-title { font-family: var(--font-d); font-size: 1.5em; font-weight: 600; margin-bottom: 14px; }
    .bridge-coda-body { font-size: 0.9em; line-height: 1.82; color: var(--muted); max-width: 580px; }

    .a11y-btn { position: fixed; bottom: 28px; right: 28px; z-index: 9999; width: 44px; height: 44px; border-radius: 50%; background: var(--bg2); border: 1px solid var(--faint); font-family: var(--font-u); font-size: 0.8125em; font-weight: 600; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .a11y-btn:hover { border-color: var(--muted); color: var(--text); }
    .a11y-panel { position: fixed; bottom: 84px; right: 28px; z-index: 9999; background: #0f0d12; border: 1px solid #3a3840; padding: 20px; width: 240px; }
    .a11y-title { font-size: 0.65em; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .a11y-row { margin-bottom: 14px; }
    .a11y-label { font-size: 0.7em; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
    .a11y-btns { display: flex; gap: 6px; }
    .a11y-opt { flex: 1; padding: 7px 0; font-size: 0.7em; font-family: var(--font-u); background: transparent; border: 1px solid var(--rule); color: var(--muted); cursor: pointer; text-align: center; }
    .a11y-opt.sel { border-color: var(--muted); color: var(--text); }

    .leaflet-control-zoom a { background: #181620 !important; color: var(--muted) !important; border-color: var(--rule) !important; }
    .leaflet-control-attribution { background: rgba(9,8,11,0.75) !important; color: var(--muted) !important; font-size: 9px !important; }

    /* Annotated lyrics */
    .anno { color: oklch(0.85 0.13 50); border-bottom: 1px dashed var(--amberD); cursor: help; position: relative; padding: 0 1px; }
    .anno-pop { display: none; position: absolute; bottom: calc(100% + 10px); left: 0; min-width: 280px; max-width: 360px; background: #15131a; border: 1px solid var(--amberD); padding: 12px 16px; font-size: 12px; line-height: 1.6; color: var(--text); font-family: var(--font-u); font-style: normal; z-index: 200; white-space: normal; letter-spacing: 0; text-transform: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); pointer-events: none; }
    .anno-pop::before { content: ''; position: absolute; bottom: -6px; left: 18px; width: 10px; height: 10px; background: #15131a; border-right: 1px solid var(--amberD); border-bottom: 1px solid var(--amberD); transform: rotate(45deg); }
    .anno:hover .anno-pop, .anno:focus .anno-pop { display: block; }

    /* Voicemail / phone log (Side A) */
    .vm-section { margin-top: 36px; }
    .vm-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 18px; background: transparent; border: none; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 16px 0; cursor: pointer; text-align: left; color: var(--text); font-family: var(--font-u); }
    .vm-toggle:hover { background: var(--bg2); }
    .vm-toggle-title { font-family: var(--font-d); font-size: 1.5em; font-weight: 600; color: var(--amber); }
    .vm-toggle-sub { font-size: 0.65em; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
    .vm-toggle-mark { font-size: 1.125em; color: var(--muted); flex-shrink: 0; }
    .vm-log { padding: 22px 0 8px; }
    .vm-frame { border: 1px solid var(--rule); background: #0d0b10; }
    .vm-statusbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px; border-bottom: 1px solid var(--rule); font-family: var(--font-m); font-size: 0.7em; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); background: #15131a; }
    .vm-statusbar-dot { width: 5px; height: 5px; border-radius: 50%; background: #c07830; display: inline-block; margin-right: 6px; vertical-align: middle; }
    .vm-row { display: grid; grid-template-columns: 130px 1fr; gap: 22px; padding: 18px 22px; border-bottom: 1px solid var(--rule); align-items: start; }
    .vm-row:last-child { border-bottom: none; }
    .vm-meta { font-family: var(--font-m); }
    .vm-time { font-size: 0.95em; color: var(--text); margin-bottom: 6px; }
    .vm-dir { font-size: 0.6em; letter-spacing: 0.18em; text-transform: uppercase; color: var(--amberD); border: 1px solid var(--amberD); padding: 2px 7px; display: inline-block; }
    .vm-from { font-family: var(--font-d); font-size: 1.125em; font-weight: 600; color: var(--amber); margin-bottom: 8px; }
    .vm-text { font-family: var(--font-d); font-size: 0.95em; font-style: italic; color: oklch(0.78 0.06 50); line-height: 1.55; margin-bottom: 10px; padding: 8px 14px; background: rgba(192,120,48,0.06); border-left: 2px solid var(--amberD); }
    .vm-note { font-size: 0.78em; line-height: 1.65; color: var(--muted); }
    .vm-note-track { color: var(--amberD); font-family: var(--font-m); font-size: 0.95em; letter-spacing: 0.06em; }
    .vm-disclaimer { padding: 11px 22px; font-size: 0.72em; color: var(--muted); border-bottom: 1px solid var(--rule); background: rgba(192,120,48,0.04); font-style: italic; line-height: 1.6; }
    .vm-disclaimer b { color: var(--amberD); font-weight: 500; font-style: normal; letter-spacing: 0.14em; text-transform: uppercase; font-size: 0.85em; margin-right: 8px; }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── DATA ──────────────────────────────────────────────────────────────────────

const BASE = 'https://raw.githubusercontent.com/amanzivino/audio/main/';
const CLIPS = {
  'sherane-a-k-a-master-splinter-s-daughter': BASE + 'Sherane%20a.k.a%20Master%20Splinters%20Daughter.mp3',
  'bitch-don-t-kill-my-vibe':                 BASE + 'kendrick-bitch-dont-kill-my-vibe.mp3',
  'backseat-freestyle':                       BASE + 'kendrick-backseat-freestyle.mp3',
  'the-art-of-peer-pressure':                 BASE + 'kendrick-art-of-peer-pressure.mp3',
  'money-trees':                              BASE + 'kendrick-money-trees.mp3',
  'poetic-justice':                           BASE + 'kendrick-poetic-justice.mp3',
  'good-kid':                                 BASE + 'kendrick-good-kid.mp3',
  'm-a-a-d-city':                             BASE + 'kendrick-maad-city.mp3',
  'swimming-pools-drank':                     BASE + 'kendrick-swimming-pools.mp3',
  'sing-about-me-i-m-dying-of-thirst':        BASE + 'kendrick-sing-about-me.mp3',
  'real':                                     BASE + 'kendrick-real.mp3',
  'compton':                                  BASE + 'kendrick-compton.mp3',
};
const clipKey = s => s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

// Given an existing `BASE + *.mp3` URL, derive a new filename with a deterministic suffix.
// Example: kendrick-real.mp3 -> kendrick-real-excerpt-1.mp3
function deriveClipUrlFromBase(baseUrl, suffix) {
  if (!baseUrl) return '';
  try {
    const last = baseUrl.split('/').pop(); // encoded filename
    const decoded = decodeURIComponent(last);
    const withoutExt = decoded.replace(/\.mp3$/i,'');
    const nextName = `${withoutExt}-${suffix}.mp3`;
    return BASE + encodeURIComponent(nextName);
  } catch (e) {
    return '';
  }
}

// Cortex track clips. These also act as fallbacks while motif-cell clips are being uploaded.
const CORTEX_CLIPS = {
  'La Rue':         BASE + 'cortex-la-rue.mp3',
  'Automne':        BASE + 'cortex-automne.mp3',
  "L'enfant Samba": BASE + 'cortex-lenfant-samba.mp3',
  'Troupeau Bleu':  BASE + 'cortex-troupeau-bleu.mp3',
  'Prélude':        BASE + 'cortex-prelude.mp3',
  'Go Round':       BASE + 'cortex-go-round.mp3',
  'Chanson':        BASE + 'cortex-chanson.mp3',
  'Mary et Jeff':   BASE + 'cortex-mary-et-jeff.mp3',
  'Huit Octobre':   BASE + 'cortex-huit-octobre.mp3',
  'Sabbat 1':       BASE + 'cortex-sabbat-1.mp3',
  'Sabbat 2':       BASE + 'cortex-sabbat-2.mp3',
  'Sabbat 3':       BASE + 'cortex-sabbat-3.mp3',
  'Madbass':        BASE + 'cortex-madbass.mp3',
};

// Motif-matrix cell clips. Upload files to /amanzivino/audio using:
// cortex-motif-{motif-slug}-{track-slug}.mp3
const MOTIF_SLUGS = {
  'Electric piano figure': 'electric-piano-figure',
  "Dalbray's vocal": 'dalbrays-vocal',
  'Gandolfi snap drums': 'gandolfi-snap-drums',
  'Grevet bass pocket': 'grevet-bass-pocket',
  'Wistful / hazy mood': 'wistful-hazy-mood',
  'Track-to-track bleed': 'track-to-track-bleed',
};

const CORTEX_TRACK_SLUGS = {
  'La Rue': 'la-rue',
  'Automne': 'automne',
  "L'enfant Samba": 'lenfant-samba',
  'Troupeau Bleu': 'troupeau-bleu',
  'Prélude': 'prelude',
  'Go Round': 'go-round',
  'Chanson': 'chanson',
  'Mary et Jeff': 'mary-et-jeff',
  'Huit Octobre': 'huit-octobre',
  'Sabbat 1': 'sabbat-1',
  'Sabbat 2': 'sabbat-2',
  'Sabbat 3': 'sabbat-3',
  'Madbass': 'madbass',
};

function getMotifClipUrl(motifLabel, trackTitle) {
  const motifSlug = MOTIF_SLUGS[motifLabel] || clipKey(motifLabel);
  const trackSlug = CORTEX_TRACK_SLUGS[trackTitle] || clipKey(trackTitle);
  return BASE + `cortex-motif-${motifSlug}-${trackSlug}.mp3`;
}

// Clips for the "Where This Sound Went" cards.
const SAMPLE_CLIPS = {
  'EARFQUAKE':     BASE + 'tyler-earfquake.mp3',
  'One Beer':      BASE + 'madvillain-one-beer.mp3',
  'Cali Sunshine': BASE + 'game-cali-sunshine.mp3',
  'Circles':       BASE + 'kanye-circles.mp3',
};

const STAGES = [
  { id:'lust', label:'LUST', tracks:[
    { num:1, name:"Sherane a.k.a. Master Splinter's Daughter", url:'https://open.spotify.com/track/7zdORPbuIBkZHCJXl9J2e5', short:"K.Dot swipes his mom's keys and drives down Rosecrans to see a girl he met at a party. He knows her family runs with gangs. He goes anyway.", lyrics:"Family history of gangbangin' did make me skeptical\nBut not enough to stop me from gettin' a nut\n\nSo now I'm down Rosecrans in a Caravan\n\nI pulled up, a smile on my face, and then I see\nTwo niggas, two black hoodies, I froze as my phone rang", analysis:"The whole album starts here — one impulsive decision to chase a girl. When K.Dot pulls up and sees two strangers in black hoodies, his phone starts ringing with his mom's voicemail. He doesn't pick up. That unanswered call is the first thread that ties the whole story together." },
    { num:2, name:"Bitch, Don't Kill My Vibe", url:'https://open.spotify.com/track/4Pwjz3DfvfQWV0rO2V8jyh', short:"K.Dot tries to hold onto himself against all the outside noise.", lyrics:"I am a sinner who's probably gonna sin again\nLord forgive me\n\nYou can see that my city found me\nThen put me on stages", analysis:"This is K.Dot pumping the brakes before everything accelerates. He knows who he is. He knows he's going to mess up again anyway." },
    { num:3, name:"Backseat Freestyle", url:'https://open.spotify.com/track/6fAyRZ0GHuuvSOEIOwi58N', short:"A flashback to being 16 with no cares — money, power, Compton.", lyrics:"All my life I want money and power\nRespect my mind or die from lead shower\n\nC-O-M-P-T-O-N, my city, mobbin' in the street", analysis:"This isn't present-day Kendrick. It's a memory — the reckless teenage version of him. Compton doesn't just shape him; it defines him." },
  ]},
  { id:'crime', label:'CRIME', tracks:[
    { num:4, name:"The Art of Peer Pressure", url:'https://open.spotify.com/track/2PieESXphabz5AkALFS08X', short:"Four deep in a white Toyota, robbing a house. K.Dot doesn't usually do this. But tonight he's with the homies.", lyrics:"Usually I'm drug-free, but, shit, I'm with the homies\n\nMe and my niggas four deep in a white Toyota\nA quarter tank of gas, one pistol, an orange soda\n\nDrop K. Dot off at his mama van at the park\n'Cause I know he tryna fuck on Sherane tonight", analysis:"The plan loops back to Sherane — they'll drop K.Dot off at the park for her after the job. Lust and crime are running on the same track." },
    { num:5, name:"Money Trees", url:'https://open.spotify.com/track/2HbKqm4o0w5wEeEFXm2sD4', short:"The robbery paid off. Then almost immediately: Uncle Tony gets shot at Louis Burgers.", lyrics:"Home invasion was persuasive\nFrom nine-to-five I know it's vacant\n\nTwo bullets in my Uncle Tony head\n\nEverybody gon' respect the shooter\nBut the one in front of the gun lives forever", analysis:"The city gives you one thing and takes away another in the same breath. You can't win here, you can only survive." },
  ]},
  { id:'violence', label:'VIOLENCE', tracks:[
    { num:6, name:"Poetic Justice", url:'https://open.spotify.com/track/1zCi4cVFqe6ja16MeGZKRN', short:"The Sherane situation was a setup. Her guys jump K.Dot.", lyrics:"Ayy, you out here for Sherane, homie?\nI don't care who this nigga over here for\nIf he don't tell me where he from, it's a wrap!\n\nGet out the car 'fore I snatch you out that motherfucker", analysis:"The romance was never just romance. Sherane's neighborhood, her whole world — K.Dot drove straight into all of it." },
    { num:7, name:"good kid", url:'https://open.spotify.com/track/3903Tbix9PdoculpJLikHf', short:"After the beating, K.Dot walks home from Bible study. Gangs come. Then police.", lyrics:"No better picture to paint than me walkin' from Bible study\n\nAnd called his homies because he had said he noticed my face\n\nWhat am I 'posed to do when the topic is red or blue\nAnd you understand that I ain't?", analysis:"This track has no profanity — and that's the whole point. He is literally a good kid. The city doesn't care." },
  ]},
  { id:'death', label:'DEATH', tracks:[
    { num:8, name:"m.A.A.d city", url:'https://open.spotify.com/track/439TlnnznSiBbQbgXiBqAd', short:"Compton's violence goes back generations. A laced blunt almost kills him.", lyrics:"Man down, where you from, nigga?\nFuck who you know, where you from, my nigga?\n\nYou killed my cousin back in '94, fuck your truce\n\nCocaine laced in marijuana\nAnd they wonder why I rarely smoke now\nImagine if your first blunt had you foaming at the mouth", analysis:'The "where you from" chant echoes from the previous track — violence with no memory, looping forever.' },
    { num:9, name:"Swimming Pools (Drank)", url:'https://open.spotify.com/track/3DFjTEueCBYqg7YE05eUJP', short:"Drinking with the crew to drown it all out. Then the skit hits: Dave is dead.", lyrics:"Nigga, why you babysittin' only two or three shots?\nI'ma show you how to turn it up a notch\n\nOkay, now open your mind up and listen me, Kendrick\nI'm your conscience\n\nD-, say somethin', D-?\nThese bitch ass niggas killed my brother", analysis:"What sounds like a club song is actually two voices at war — one pulling him deeper in, one begging him to stop." },
  ]},
  { id:'reflection', label:'REFLECTION', tracks:[
    { num:10, name:"Sing About Me, I'm Dying of Thirst", url:'https://open.spotify.com/track/0sd6BRTa0O96tfEbFGhJF9', short:"Three voices reckon with death and meaning.", lyrics:"Lord God, I come to you a sinner\nAnd I humbly repent for my sins\n\nIf I die before your album drops,\nI hope you sing about me", analysis:"The opening prayer on Track 1 returns here, word for word. The whole album is the space between those two identical prayers." },

// Wraps annotated phrases inside a lyric string with hover-popup spans.
function renderAnnotated(text, annotations) {
  if (!annotations || annotations.length === 0) return text;
  let nodes = [text];
  let idx = 0;
  annotations.forEach(a => {
    const next = [];
    nodes.forEach(node => {
      if (typeof node !== 'string') { next.push(node); return; }
      const segs = node.split(a.phrase);
      segs.forEach((s, i) => {
        if (s) next.push(s);
        if (i < segs.length - 1) {
          next.push(
            <span key={'anno-' + (idx++)} className="anno" tabIndex="0">
              {a.phrase}
              <span className="anno-pop">{a.note}</span>
            </span>
          );
        }
      });
    });
    nodes = next;
  });
  return nodes;
}

function getKendrickTrackByNum(trackNum) {
  return STAGES.flatMap(stage => stage.tracks).find(track => track.num === trackNum);
}

function getCortexTrackBySlug(trackSlug) {
  return CORTEX.find(track => {
    const slugs = [
      CORTEX_TRACK_SLUGS[track.clipKey],
      clipKey(track.clipKey),
      clipKey(track.title),
    ].filter(Boolean);
    return slugs.includes(trackSlug);
  });
}

function getEraPlaybackTheme(era) {
  return {
    accent: era.color,
    bg: `linear-gradient(90deg, ${era.bg}, rgba(9,8,11,0.94))`,
    border: era.dim,
    label: era.dim,
    text: era.color,
  };
}

function getPlaybackMeta(key) {
  const fallback = { title: 'Now playing', theme: PLAYBACK_THEMES.kendrick };
  if (!key) return fallback;

  const kendrickTrack = STAGES
    .flatMap(stage => stage.tracks)
    .find(track => {
      const slug = clipKey(track.name);
      return key === slug || key.startsWith(slug + '-excerpt-');
    });
  if (kendrickTrack) {
    return { title: 'Kendrick Lamar — ' + kendrickTrack.name, theme: PLAYBACK_THEMES.kendrick };
  }

  if (key.startsWith('vm-')) {
    const vmNum = Number(key.replace('vm-', ''));
    const vm = VOICEMAILS.find(item => item.num === vmNum);
    const track = vm ? getKendrickTrackByNum(vm.track) : null;
    if (track) return { title: 'Kendrick Lamar — ' + track.name, theme: PLAYBACK_THEMES.kendrick };
    if (vm) return { title: 'Kendrick Lamar — ' + vm.song, theme: PLAYBACK_THEMES.kendrick };
  }

  if (key.startsWith('cortex-motif-')) {
    const track = CORTEX.find(item => {
      const trackSlug = CORTEX_TRACK_SLUGS[item.clipKey] || clipKey(item.clipKey);
      return key.endsWith('-' + trackSlug);
    });
    if (track) return { title: 'Cortex — ' + track.title, theme: PLAYBACK_THEMES.cortex };
  }

  if (key.startsWith('cortex-')) {
    const trackSlug = key.replace(/^cortex-/, '');
    const track = getCortexTrackBySlug(trackSlug);
    if (track) return { title: 'Cortex — ' + track.title, theme: PLAYBACK_THEMES.cortex };
  }

  if (key.startsWith('sample-')) {
    const sample = SAMPLES.find(item => 'sample-' + clipKey(item.track) === key);
    if (sample) return { title: sample.artist + ' — ' + sample.track, theme: PLAYBACK_THEMES.cortex };
  }

  if (key.startsWith('history-')) {
    const era = TIMELINE.find(item => item.clipKey === key);
    if (era) return { title: era.work, theme: getEraPlaybackTheme(era) };
  }

  return fallback;
}

function Nav() {
  const [stuck, setStuck] = useState(false);
  const [active, setActive] = useState('');
  useEffect(() => {
    let raf = 0;
    const compute = () => {
      raf = 0;
      setStuck(window.scrollY > 60);
      for (const id of ['bridge','side-b','side-a','history']) {
        const el = document.getElementById(id);
        if (el && window.scrollY >= el.offsetTop - 120) { setActive(id); return; }
      }
      setActive('');
    };
    const fn = () => { if (!raf) raf = requestAnimationFrame(compute); };
    window.addEventListener('scroll', fn, { passive: true });
    return () => { window.removeEventListener('scroll', fn); if (raf) cancelAnimationFrame(raf); };
  }, []);
  const go = id => { const el = document.getElementById(id); if (el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'}); };
  const labels = { 'history':'History', 'side-a':'Side A', 'side-b':'Side B', 'bridge':'Bridge' };
  return (
    <nav className={'nav'+(stuck?' stuck':'')}>
      <button className="nav-logo" onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>A·C</button>
      <div className="nav-links">
        {['history','side-a','side-b','bridge'].map(id => (
          <button key={id} className={'nav-btn'+(active===id?' on':'')} onClick={() => go(id)}>
            {labels[id]}
          </button>
        ))}
      </div>
    </nav>
  );
}

function MapView({ onPin, activeLoc, onReady, onMarkersReady, onLabelsReady, panelOpenRef }) {
  const mapRef = useRef(null);
  const darkRef = useRef(null);
  const satRef = useRef(null);
  const [isSat, setIsSat] = useState(false);

  const switchLayer = (toSat) => {
    const map = mapRef.current;
    if (!map) return;
    if (toSat && !map.hasLayer(satRef.current)) { map.removeLayer(darkRef.current); satRef.current.addTo(map); }
    if (!toSat && !map.hasLayer(darkRef.current)) { map.removeLayer(satRef.current); darkRef.current.addTo(map); }
    setIsSat(toSat);
  };

  useEffect(() => {
    const map = L.map('compton-map', { center:[34.05,-118.25], zoom:10, zoomControl:true, scrollWheelZoom:false });
    mapRef.current = map;
    if (onReady) onReady(map);

    const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'&copy; CARTO', subdomains:'abcd', maxZoom:19 });
    const sat  = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'&copy; Esri', maxZoom:19 });
    dark.addTo(map);
    darkRef.current = dark;
    satRef.current = sat;

    setTimeout(() => map.flyTo([33.897,-118.220], 12, { duration:2.6, easeLinearity:0.22 }), 350);

    setTimeout(() => {
      const s = document.createElement('style');
              s.textContent = '.ctip{background:#09080b;border:1px solid #2a2730;box-shadow:none;padding:5px 10px;border-radius:0;color:#c07830;font-family:Space Grotesk,sans-serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase}.ctip::before{display:none}.mpop{pointer-events:none}.mpop .leaflet-popup-content-wrapper{background:#09080b;border:1px solid #2a2730;border-radius:0;box-shadow:none;padding:0;z-index:9999}.mpop .leaflet-popup-content{margin:0;padding:12px 16px}.mpop .leaflet-popup-tip-container,.mpop .leaflet-popup-close-button{display:none}';
      document.head.appendChild(s);
      const markers = [];
      const labels = [];
      PINS.forEach((pin) => {
        const m = L.circleMarker([pin.lat,pin.lng], { radius:6, fillColor:'#c07830', color:'#c07830', weight:1.5, opacity:1, fillOpacity:0.85 }).addTo(map);
        m.bindTooltip(pin.name+' · '+pin.trackSong, { className:'ctip', direction:'top', offset:[0,-10] });
          m.on('mouseover', () => { if (panelOpenRef && panelOpenRef.current && panelOpenRef.current === pin.id) m.closeTooltip(); });

        m.on('click', () => {
          map.closePopup();
          markers.forEach(mk => mk.setStyle({ opacity:0, fillOpacity:0 }));
          map.flyTo([pin.lat,pin.lng], 15, { duration:1.4, easeLinearity:0.25 });
          map.once('moveend', () => {
            markers.forEach(mk => mk.setStyle({ opacity:1, fillOpacity:0.85 }));
            m.openPopup();
          });
          onPin(pin);

        markers.push(m);
        const label = L.marker([pin.lat,pin.lng], {

          icon:L.divIcon({
            className:'map-pin-label',

          }),

    }, 3200);

    return () => { map.remove(); mapRef.current = null; };
  }, []);

function MotifMatrix({ playing, onToggle }) {
  const ch = (n) => n === 0 ? '·' : n === 1 ? '○' : n === 2 ? '◐' : '●';
  const staticDot = (n) => <span className={'mot-dot mot-'+n}>{ch(n)}</span>;
  const cellDot = (n, motif, track) => {
    if (n < 1) return staticDot(n);
    const url = getMotifClipUrl(motif, track);
    const fallbackUrl = CORTEX_CLIPS[track] || '';
    if (!url) return staticDot(n);
    const motifSlug = MOTIF_SLUGS[motif] || clipKey(motif);
    const trackSlug = CORTEX_TRACK_SLUGS[track] || clipKey(track);
    const key = 'cortex-motif-' + motifSlug + '-' + trackSlug;
    const isPlaying = playing === key;
    return (
      <button
        className={'mot-dot mot-' + n + ' mot-btn' + (isPlaying ? ' mot-playing' : '')}
        onClick={() => onToggle(key, url, fallbackUrl)}
        title={(isPlaying ? 'Pause ' : 'Play ') + motif + ' in ' + track}
        aria-label={(isPlaying ? 'Pause ' : 'Play ') + motif + ' in ' + track}
      >
        {ch(n)}
      </button>
    );
  };
  return (
    <div className="motif">
      <div className="motif-head">
        <div>
          <div className="motif-title">Motif Recurrence Matrix</div>
          <div className="motif-sub" style={{marginTop:4}}>Sound Continuity, Mapped</div>
        </div>
      </div>
      <p className="motif-intro">The same sounds, the same hands, the same mood — across thirteen tracks. Filled circles mark central use; half-circles, supporting; rings, subtle. The density of any column tells you how strong that track's bond to the album's identity is; the density of any row tells you how persistently that element threads through the whole record.</p>
      <div className="mot-cta">
        <span className="mot-cta-icon">▶</span>
        <div>
          <span className="mot-cta-eye">Listening Booth</span>
          <span className="mot-cta-text">Every active matrix mark is a play button — click any one to hear that motif in that Cortex track.</span>
        </div>
      </div>
      <div className="motif-tablewrap">
        <table className="motif-table">
          <thead>
            <tr>
              <th></th>
              {MOTIFS.cols.map(c => <th key={c}>{c}</th>)}
            </tr>
          </thead>
          <tbody>
            {MOTIFS.rows.map(r => (
              <tr key={r.lbl}>
                <th scope="row">{r.lbl}</th>
                {r.cells.map((c, i) => <td key={i}>{cellDot(c, r.lbl, MOTIFS.cols[i])}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="motif-legend">
        <span>{staticDot(3)} central</span>
        <span>{staticDot(2)} present</span>
        <span>{staticDot(1)} subtle</span>
        <span>{staticDot(0)} absent</span>
      </div>
    </div>
  );
}

function App() {
  const [locPanel, setLocPanel]   = useState(null);

  const [atlasOpen, setAtlasOpen] = useState(true);
  const [playing,  setPlaying]    = useState('');
  const playingRef = useRef('');
  const setPlayingSync = (key) => { playingRef.current = key; setPlaying(key); };
  const audioRef    = useRef(null);
  const mapRef      = useRef(null);
  const markersRef  = useRef([]);
  const labelsRef   = useRef([]);
  const mapWrapRef  = useRef(null);
  const scrollLocked = useRef(false);
  const pinIdxRef   = useRef(-1);

  const panelOpenRef = useRef(false);
  useEffect(() => { panelOpenRef.current = locPanel ? locPanel.id : null; }, [locPanel]);

  // Keep pinIdxRef in sync with pinIdx so the wheel handler always sees the current pin.
  useEffect(() => { pinIdxRef.current = pinIdx; }, [pinIdx]);

  useEffect(() => {
    audioRef.current = new Audio();
    const onEnd = () => {
      if (audioRef.current) {
        audioRef.current.pause();
        audioRef.current.currentTime = 0;
      }
      setPlayingSync('');
    };
    audioRef.current.addEventListener('ended', onEnd);
    return () => { audioRef.current.pause(); audioRef.current.removeEventListener('ended', onEnd); };
  }, []);

  // One-gesture-one-slide snap for the first 3 sections (+ Side A as the destination edge).
  // Gesture detection: absorb the inertia tail from one trackpad flick, but release on
  // a hard timer so the early slides never require a click before the next scroll.
  useEffect(() => {
    let gestureActive = false;
    let gestureTimer = null;
    let gestureStarted = 0;
    let keyLastTime = 0;
    const SELECTORS = ['.hero.hero-narrow', '#history', '.albums-intro', '#side-a'];
    const getState = () => {
      const els = SELECTORS.map(s => document.querySelector(s));
      if (els.some(el => !el)) return null;
      const tops = els.map(el => Math.max(0, el.offsetTop - 60));
      let currentIdx = 0, bestDist = Infinity;
      for (let i = 0; i < tops.length; i++) {
        const d = Math.abs(window.scrollY - tops[i]);
        if (d < bestDist) { currentIdx = i; bestDist = d; }
      }
      return { tops, currentIdx, bestDist };
    };
    const resetGesture = () => {
      if (gestureTimer) clearTimeout(gestureTimer);
      gestureActive = false;
      gestureTimer = null;
      gestureStarted = 0;
    };
    const armIdle = () => {
      if (gestureTimer) clearTimeout(gestureTimer);
      gestureTimer = setTimeout(resetGesture, 240);
    };
    const onWheel = (e) => {
      // While a gesture is in flight (initial scroll + inertia tail), eat everything
      // briefly, then release even if the browser keeps sending tiny wheel events.
      if (gestureActive) {
        if (Date.now() - gestureStarted < 850) {
          e.preventDefault();
          armIdle();
          return;
        }
        resetGesture();
      }
      const s = getState();
      if (!s || s.bestDist > 140) return;
      const dir = e.deltaY > 0 ? 1 : -1;
      const nextIdx = s.currentIdx + dir;
      if (nextIdx < 0 || nextIdx >= s.tops.length) return;
      e.preventDefault();
      window.scrollTo({ top: s.tops[nextIdx], behavior: 'smooth' });
      gestureActive = true;
      gestureStarted = Date.now();
      armIdle();
    };
    const onKey = (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return;
      const isDown = e.key === 'ArrowDown' || e.key === 'PageDown';
      const isUp = e.key === 'ArrowUp' || e.key === 'PageUp';
      if (!isDown && !isUp) return;
      const now = Date.now();
      // Keys have their own throttle, completely independent of wheel state.
      if (now - keyLastTime < 320) { e.preventDefault(); return; }
      const s = getState();
      if (!s || s.bestDist > 140) return;
      const dir = isDown ? 1 : -1;
      const nextIdx = s.currentIdx + dir;
      if (nextIdx < 0 || nextIdx >= s.tops.length) return;
      e.preventDefault();
      keyLastTime = now;
      window.scrollTo({ top: s.tops[nextIdx], behavior: 'smooth' });
    };
    window.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKey);
    return () => {
      window.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
      resetGesture();
    };
  }, []);

  const stopAll = () => {
    const a = audioRef.current;
    if (a) { a.onerror = null; a.pause(); a.currentTime = 0; }
    playingRef.current = '';
    setPlaying('');
  };

  const onToggle = async (key, url, fallbackUrl = '') => {
    if (!url || !audioRef.current) return;
    const a = audioRef.current;
    if (playingRef.current === key) { a.onerror = null; a.pause(); setPlayingSync(''); return; }
    const sources = [url, fallbackUrl].filter((src, i, arr) => src && arr.indexOf(src) === i);
    let sourceIdx = 0;
    const playSource = async () => {
      const src = sources[sourceIdx];
      if (!src) { setPlayingSync(''); return; }
      a.onerror = () => {
        if (playingRef.current !== key) return;
        sourceIdx += 1;
        playSource();
      };
      try {
        a.pause();
        a.currentTime = 0;
        a.src = src;
        await a.play();
        setPlayingSync(key);
      } catch(e) {
        sourceIdx += 1;
        if (sourceIdx < sources.length) await playSource();
        else setPlayingSync('');
      }
    };
    setPlayingSync(key);
    await playSource();
  };

  const setMapLabelsVisible = (visible) => {
    labelsRef.current.forEach(label => label.setOpacity(visible ? 1 : 0));
  };

  const goToPin = (i) => {
    const pin = PINS[i];
    pinIdxRef.current = i;
    setPinIdx(i);
    setLocPanel(pin);
    setMapLabelsVisible(false);
    const map = mapRef.current;
    if (!map) return;
    map.closePopup();
    markersRef.current.forEach(m => { m.closePopup(); m.setStyle({ opacity:0, fillOpacity:0 }); });
    map.flyTo([pin.lat,pin.lng], 15, { duration:1.2, easeLinearity:0.25 });
    map.once('moveend', () => {
      markersRef.current.forEach(m => m.setStyle({ opacity:1, fillOpacity:0.85 }));
      if (markersRef.current[i]) markersRef.current[i].openPopup();
    });
  };

  // Overview after the last pin: zoom out to fit all five locations in the frame.
  const showOverview = () => {
    pinIdxRef.current = PINS.length;
    setPinIdx(PINS.length);
    setLocPanel({ overview: true });
    setMapLabelsVisible(false);
    const map = mapRef.current;
    if (!map) return;
    map.closePopup();
    markersRef.current.forEach(m => { m.closePopup(); m.setStyle({ opacity:1, fillOpacity:0.85 }); });
    const bounds = L.latLngBounds(PINS.map(p => [p.lat, p.lng]));
    map.flyToBounds(bounds, { duration:1.6, easeLinearity:0.25, padding:[60,60] });
    map.once('moveend', () => setMapLabelsVisible(true));
  };

  useEffect(() => {
    let completed = false;
    let animating = false;
    const lock   = () => { document.body.style.overflow='hidden'; scrollLocked.current=true; };
    const unlock = () => { document.body.style.overflow='';       scrollLocked.current=false; };

    const advance = (dir) => {
      if (animating) return;
      const next = pinIdxRef.current + dir;
      if (next < 0) { unlock(); return; }
      if (next < PINS.length) {
        animating = true;
        goToPin(next);
        if (mapRef.current) mapRef.current.once('moveend', () => { animating = false; });
        else setTimeout(() => { animating = false; }, 1400);
        return;
      }
      if (next === PINS.length) {
        // After the last pin, zoom out so all five points are visible.
        animating = true;
        showOverview();
        if (mapRef.current) mapRef.current.once('moveend', () => { animating = false; });
        else setTimeout(() => { animating = false; }, 1700);
        return;
      }
      // Past the overview: release scroll, let the user continue down the page.
      completed = true; unlock();
    };

    const onWheel = (e) => {
      const wrap = mapWrapRef.current;
      // Not yet locked: engage ONLY on real user wheel input (so programmatic
      // smooth-scrolls from the hero cards / nav don't get hijacked by the map).
      if (!scrollLocked.current) {
        if (completed || pinIdxRef.current !== -1 || !wrap) return;
        const rect = wrap.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        if (Math.abs(mid - window.innerHeight * 0.5) < rect.height * 0.4) {
          e.preventDefault(); e.stopPropagation();
          lock();
          window.scrollTo({ top: wrap.offsetTop - 60, behavior:'smooth' });
          setTimeout(() => goToPin(0), 400);
        }
        return;
      }
      // Locked: each wheel tick steps through the pins.
      e.preventDefault(); e.stopPropagation();
      if (animating) return;
      advance(e.deltaY > 0 ? 1 : -1);
    };

    const onScroll = () => {
      const wrap = mapWrapRef.current;
      if (!wrap) return;
      const rect = wrap.getBoundingClientRect();
      // Reset once the user has fully passed the map after completion.
      if (completed && rect.bottom < 0) {
        completed = false; animating = false;
        setMapLabelsVisible(false);
        setPinIdx(-1); pinIdxRef.current = -1; setLocPanel(null);
      }
    };

    // Arrow / Page keys mirror the wheel behavior so keyboard users get the same
    // map experience: engage when the map is centered, then step through pins.
    const onKey = (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return;
      const isDown = e.key === 'ArrowDown' || e.key === 'PageDown';
      const isUp = e.key === 'ArrowUp' || e.key === 'PageUp';
      if (!isDown && !isUp) return;
      const wrap = mapWrapRef.current;
      if (!scrollLocked.current) {
        if (completed || pinIdxRef.current !== -1 || !wrap) return;
        const rect = wrap.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        if (Math.abs(mid - window.innerHeight * 0.5) < rect.height * 0.4) {
          e.preventDefault(); e.stopPropagation();
          lock();
          window.scrollTo({ top: wrap.offsetTop - 60, behavior:'smooth' });
          setTimeout(() => goToPin(0), 400);
        }
        return;
      }
      e.preventDefault(); e.stopPropagation();
      if (animating) return;
      advance(isDown ? 1 : -1);
    };

    window.addEventListener('scroll', onScroll, { passive:true });
    document.addEventListener('wheel',  onWheel,  { passive:false, capture:true });
    document.addEventListener('keydown', onKey,   { capture:true });
    return () => {
      window.removeEventListener('scroll', onScroll);
      document.removeEventListener('wheel', onWheel, { capture:true });
      document.removeEventListener('keydown', onKey, { capture:true });
      unlock();
    };
  }, []);

  const scrollTo = id => { const el=document.getElementById(id); if(el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'}); };
  const playbackMeta = getPlaybackMeta(playing);
  const showNowPlaying = playing && !playing.startsWith('cortex-motif-');
  const mapCounterLabel = pinIdx === PINS.length ? 'All 5' : (pinIdx >= 0 ? (pinIdx + 1) + ' / ' + PINS.length : '— / ' + PINS.length);

  return (
    <>
      <Nav />

      <section className="hero hero-narrow">
        <div>
          <div className="hero-kicker">HUM 2020 · Album Continuity · By Alexander Anzivino</div>
          <div className="hero-magnum">A Magnum Opus</div>
          <div className="hero-title">ALBUM<br />CONTINUITY</div>
          <hr className="hero-rule" />
          <p className="hero-thesis">How does a long piece of music hold together as one thing? It's a question with a thousand-year history — chant, polyphony, sonata form, the LP. This project ends with two records that take it in radically opposite directions.</p>
        </div>
      </section>

      <HistoryTimeline playing={playing} onToggle={onToggle} />

      <section className="albums-intro">
        <div className="albums-intro-eye">The Two Records</div>
        <div className="albums-intro-title">Two answers to the same question, fifty years apart.</div>
        <div className="hero-cards">
          <div className="hero-card a" onClick={() => scrollTo('side-a')}>
            <div className="hero-card-eye">Side A · Story Continuity</div>
            <a className="hero-card-title" href="https://open.spotify.com/album/6PBZN8cbwkqm1ERj2BGXJ1" target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}>good kid,<br />m.A.A.d city</a>
            <div className="hero-card-sub">Kendrick Lamar · 2012 · Compton, CA</div>
            <div className="hero-card-arrow">↓</div>
          </div>
          <div className="hero-card b" onClick={() => scrollTo('side-b')}>
            <div className="hero-card-eye">Side B · Sound Continuity</div>
            <a className="hero-card-title" href="https://open.spotify.com/album/74DOWHisu2jlFvPid9YTGB" target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}>Troupeau Bleu</a>
            <div className="hero-card-sub">Cortex · 1975 · Paris, France</div>
            <div className="hero-card-arrow">↓</div>
          </div>
        </div>
      </section>

      <section id="side-a">
        <div className="sec-head">
          <div className="sec-title a">good kid,<br />m.A.A.d city</div>
          <div className="sec-right">
            <span className="sec-label">Side A · Story Continuity</span>
            <span className="sec-meta">Kendrick Lamar · Compton, CA · 2012</span>
            <a className="spotify-link a" href="https://open.spotify.com/album/6PBZN8cbwkqm1ERj2BGXJ1" target="_blank" rel="noopener">♫ Full Album</a>
          </div>
        </div>
        <div className="editorial">
          <div className="ed-intro">
            <div className="ed-intro-label">Track by Track — Chain Reaction</div>
            <div className="ed-intro-text">Continuity here is causal: each track is a consequence of the last. The album follows one day in Compton: one choice leads to the next. Click a track to expand, or click its title to open Spotify.</div>
          </div>

          <button className="char-toggle" onClick={() => setCharOpen(o=>!o)}>
            <div>
              <div className="char-toggle-title">Character List</div>
              <div className="char-toggle-sub">The People In The Album</div>
            </div>
            <div className="char-toggle-mark">{charOpen?'−':'+'}</div>
          </button>
          {charOpen && (
            <div className="char-list">
              {CHARS.map(c => (
                <div key={c.name} className="char-row">
                  <div><div className="char-name">{c.name}</div><div className="char-role">{c.role}</div></div>
                  <div className="char-desc">{c.desc}</div>
                </div>
              ))}
            </div>
          )}

          {STAGES.map((stage,si) => (
            <div key={stage.id}>
              <div className="stage-divider">
                <span className="stage-divider-num">{String(si+1).padStart(2,'0')}</span>
                <span className="stage-divider-name">{stage.label}</span>
                <div className="stage-divider-line" />
              </div>
              {stage.tracks.map(t => <TrackRow key={t.num} track={t} badge={stage.label} playing={playing} onToggle={onToggle} />)}
            </div>
          ))}

          <VoicemailLog playing={playing} onToggle={onToggle} />

          <div className="map-chapter">
            <button className="map-chapter-head map-chapter-toggle" onClick={() => { setAtlasOpen(o => !o); if (atlasOpen) { setLocPanel(null); setPinIdx(-1); pinIdxRef.current = -1; setMapLabelsVisible(false); } }}>
              <div>
                <div className="map-chapter-title">Compton Atlas</div>
                <div className="map-chapter-sub">Geography Behind The Story</div>
              </div>
              <div className="map-chapter-mark">{atlasOpen ? '−' : '+'}</div>
            </button>
            {atlasOpen && (
              <>
                <div ref={mapWrapRef} style={{position:'relative'}}>
                  <MapView
                    onPin={pin => { setMapLabelsVisible(false); setLocPanel(pin); setPinIdx(PINS.findIndex(p=>p.id===pin.id)); }}
                    activeLoc={locPanel}
                    onReady={m => { mapRef.current = m; }}
                    onMarkersReady={m => { markersRef.current = m; }}
                    onLabelsReady={m => { labelsRef.current = m; }}
                    panelOpenRef={panelOpenRef}
                  />
                  <div style={{...OVERLAY_STYLE, bottom:28, left:'50%', transform:'translateX(-50%)'}}>
                    <button style={{...OBTN,color:'rgba(255,255,255,0.5)'}} onClick={() => goToPin(pinIdx<=0?PINS.length-1:pinIdx-1)}>← Back</button>
                    <div style={ODIV} />
                    <span style={{fontFamily:'DM Mono,monospace',fontSize:'9px',color:'rgba(255,255,255,0.3)',minWidth:46,textAlign:'center',padding:'0 4px'}}>{mapCounterLabel}</span>
                    <div style={ODIV} />
                    <button style={{...OBTN,color:'rgba(255,255,255,0.5)'}} onClick={() => goToPin(pinIdx>=PINS.length-1||pinIdx===-1?0:pinIdx+1)}>Next →</button>
                  </div>
                </div>
                {locPanel ? (
                  locPanel.overview ? (
                    <div className="loc-panel">
                      <div className="loc-n">5</div>
                      <div>
                        <div className="loc-name">All Five Locations</div>
                        <div className="loc-track">The full geography of one day</div>
                        <div className="loc-body">Rosecrans → Gonzales Park → Louis Burgers → Sherane's side → Central Compton. The drive that started chasing a girl ends with a city. Five points, one day, one album.</div>
                        <button style={{marginTop:12,fontSize:'0.65em',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--muted)',background:'none',border:'none',fontFamily:'var(--font-u)',cursor:'pointer'}} onClick={() => { setMapLabelsVisible(false); setLocPanel(null); setPinIdx(-1); pinIdxRef.current = -1; }}>Close ×</button>
                      </div>
                    </div>
                  ) : (
                    <div className="loc-panel">
                      <div className="loc-n">{String(locPanel.trackNum).padStart(2,'0')}</div>
                      <div>
                        <div className="loc-name">{locPanel.name}</div>
                        <div className="loc-track">Track {String(locPanel.trackNum).padStart(2,'0')} — {locPanel.trackSong}</div>
                        <div className="loc-body">{locPanel.body}</div>
                        <button style={{marginTop:12,fontSize:'0.65em',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--muted)',background:'none',border:'none',fontFamily:'var(--font-u)',cursor:'pointer'}} onClick={() => { setMapLabelsVisible(false); setLocPanel(null); setPinIdx(-1); pinIdxRef.current = -1; }}>Close ×</button>
                      </div>
                    </div>
                  )
                ) : (
                  <div className="loc-hint">Click a pin or use the arrows to explore locations</div>
                )}
              </>
            )}
          </div>
        </div>
      </section>

      <section id="side-b" style={{borderTop:'1px solid var(--rule)'}}>
        <div className="sec-head">
          <div className="sec-title b">Troupeau Bleu</div>
          <div className="sec-right">
            <span className="sec-label">Side B · Sound Continuity</span>
            <span className="sec-meta">Cortex · Paris · 1975</span>
            <a className="spotify-link b" href="https://open.spotify.com/album/74DOWHisu2jlFvPid9YTGB" target="_blank" rel="noopener">♫ Find on Spotify</a>
          </div>
        </div>
        <div className="ed-intro" style={{padding:'32px 40px 24px'}}>
          <div className="ed-intro-text">This album does not move forward, it deepens. Continuity comes from staying inside the same sound world.</div>
        </div>
        <div className="framework">
          {FRAMEWORK.sonic.map(el => (
            <div key={el.lbl} className="fw-cell">
              <div className="fw-label">{el.lbl}</div>
              <div className="fw-desc">{el.desc}</div>
            </div>
          ))}
        </div>
        <MotifMatrix playing={playing} onToggle={onToggle} />
        <div style={{padding:'24px 40px 8px'}}>
          <div className="ed-intro-label">Key Tracks — Click to expand, click title for Spotify</div>
        </div>
        {CORTEX.map(t => <CortexRow key={t.num} track={t} playing={playing} onToggle={onToggle} />)}
        <SampleLineage playing={playing} onToggle={onToggle} />
      </section>

      <section id="bridge" style={{borderTop:'1px solid var(--rule)'}} className="bridge">
        <div className="bridge-kicker">Final Take</div>
        <div className="bridge-title">Two Approaches,<br />One Goal</div>
        <p className="bridge-body">One album holds together through cause and effect. The other holds together through recurrence and atmosphere. Both show how art can keep a clear identity across time while still moving forward.</p>
        <div className="bridge-cols">
          <div className="b-col-a">
            <div className="bridge-col-eye">Side A</div>
            <div className="bridge-col-title">good kid, m.A.A.d city</div>
            <div className="bridge-col-mode">Story is the thread</div>
            {FRAMEWORK.narrative.map(el => (
              <div key={el.lbl} className="bridge-el">
                <div className="bridge-el-lbl">{el.lbl}</div>
                <div className="bridge-el-desc">{el.desc}</div>
              </div>
            ))}
          </div>
          <div className="bridge-divider" />
          <div className="b-col-b">
            <div className="bridge-col-eye">Side B</div>
            <div className="bridge-col-title">Troupeau Bleu</div>
            <div className="bridge-col-mode">Sound is the thread</div>
            {FRAMEWORK.sonic.map(el => (
              <div key={el.lbl} className="bridge-el">
                <div className="bridge-el-lbl">{el.lbl}</div>
                <div className="bridge-el-desc">{el.desc}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="bridge-coda">
          <div className="bridge-coda-title">Why It Works</div>
          <div className="bridge-coda-body">Kendrick builds a clear plot. Cortex builds a clear atmosphere. Both stay focused on one thread from beginning to end.</div>
        </div>
        <p className="bridge-body" style={{marginBottom:0}}>Across a thousand years, the methods change, but the goal does not: to make time feel like a single, continuous thing.</p>
      </section>

      <A11y />
      {showNowPlaying && (
        <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',zIndex:9999,display:'flex',alignItems:'center',gap:12,background:playbackMeta.theme.bg,border:'1px solid '+playbackMeta.theme.border,borderRadius:6,padding:'8px 16px',backdropFilter:'blur(12px)',maxWidth:'90vw'}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:playbackMeta.theme.accent,flexShrink:0,animation:'pulse 1.2s infinite'}} />
          <span style={{fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',color:playbackMeta.theme.label,fontFamily:'Space Grotesk,sans-serif',flexShrink:0}}>Now Playing</span>
          <span style={{fontFamily:'Cormorant Garamond,Georgia,serif',fontStyle:'italic',fontSize:'13px',color:playbackMeta.theme.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:300}}>
            {playbackMeta.title}
          </span>
          <button onClick={stopAll} style={{fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',padding:'5px 10px',background:'transparent',color:playbackMeta.theme.accent,cursor:'pointer',fontFamily:'Space Grotesk,sans-serif',border:'1px solid '+playbackMeta.theme.border,borderRadius:3,flexShrink:0}}>■ Stop</button>
        </div>
      )}
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
