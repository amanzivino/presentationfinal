function HistoryTimeline({ playing, onToggle }) {
  const [active, setActive] = useState(0);
  const era = TIMELINE[active];
  const isSelf = !!era.self;
  const isPlaying = playing === era.clipKey;
  const eraStyle = {'--era-color': era.color, '--era-dim': era.dim, '--era-ring': era.ring, '--era-bg': era.bg};
  return (
    <section id="history" className="history-section">
      <div className="history-head">
        <div className="history-eyebrow">A Brief History of Continuity</div>
        <div className="history-title">A Thousand-Year Lineage</div>
        <div className="history-sub">Six moments in the long effort to make music feel whole</div>
        <p className="history-intro">Album continuity is part of a much older question: how does music make a stretch of time feel whole? For a thousand years, composers and performers have answered that in different ways. These two albums are modern versions of the same problem.</p>
      </div>
      <div className="history-track">
        <div className="history-line" />
        {TIMELINE.map((t, i) => (
          <button
            key={t.era}
            className={'history-node' + (active===i ? ' on' : '') + (t.self ? ' self' : '')}
            style={{'--era-color': t.color, '--era-dim': t.dim, '--era-ring': t.ring, '--era-bg': t.bg}}
            onClick={() => setActive(i)}
            aria-current={active===i ? 'step' : undefined}
          >
            <div className="history-node-icon">{t.icon}</div>
            <div className="history-node-dot" />
            <div className="history-node-era">{t.era}</div>
          </button>
        ))}
      </div>
      <div className={'history-detail' + (isSelf ? ' self' : '')} style={eraStyle}>
        <div className="history-detail-grid">
          <div>
            <div className="history-detail-era">{era.era}</div>
            <div className="history-detail-label">{era.label}</div>
            <div className="history-detail-type">{era.type}</div>
            <div className="history-detail-work">{era.work}</div>
            <button
              className={'history-clip' + (isPlaying ? ' playing' : '') + (isSelf ? ' self' : '')}
              onClick={() => onToggle(era.clipKey, era.clipUrl)}
              disabled={!era.clipUrl}
            >
              {era.clipUrl ? (isPlaying ? '⏸ Pause Sample' : '▶ Play Sample') : 'Clip URL Missing'}
            </button>
          </div>
          <div className="history-detail-body">{era.body}</div>
        </div>
      </div>
      <p className="history-intro">By the album era, continuity can travel two ways: through a story that keeps moving, or through a sound that keeps returning. The two records here push those paths as far as they can.</p>
    </section>
  );
}

function App() {
  const [locPanel, setLocPanel]   = useState(null);
  const [pinIdx,   setPinIdx]     = useState(-1);
  const [charOpen, setCharOpen]   = useState(false);
  const [atlasOpen, setAtlasOpen] = useState(true);
  const [playing,  setPlaying]    = useState('');
  const playingRef = useRef('');
  const setPlayingSync = (key) => { playingRef.current = key; setPlaying(key); };
  const audioRef    = useRef(null);
  const mapRef      = useRef(null);
  const markersRef  = useRef([]);
  const labelsRef   = useRef([]);
  const mapWrapRef  = useRef(null);
  const scrollLocked = useRef(false);
  const pinIdxRef   = useRef(-1);

  const panelOpenRef = useRef(false);
  useEffect(() => { panelOpenRef.current = locPanel ? locPanel.id : null; }, [locPanel]);

  // Keep pinIdxRef in sync with pinIdx so the wheel handler always sees the current pin.
  useEffect(() => { pinIdxRef.current = pinIdx; }, [pinIdx]);

  useEffect(() => {
    audioRef.current = new Audio();
    const onEnd = () => {
      if (audioRef.current) {
        audioRef.current.pause();
        audioRef.current.currentTime = 0;
      }
      setPlayingSync('');
    };
    audioRef.current.addEventListener('ended', onEnd);
    return () => { audioRef.current.pause(); audioRef.current.removeEventListener('ended', onEnd); };
  }, []);

  // One-gesture-one-slide snap for the first 3 sections (+ Side A as the destination edge).
  // Gesture detection: absorb the inertia tail from one trackpad flick, but release on
  // a hard timer so the early slides never require a click before the next scroll.
  useEffect(() => {
    let gestureActive = false;
    let gestureTimer = null;
    let gestureStarted = 0;
    let keyLastTime = 0;
    const SELECTORS = ['.hero.hero-narrow', '#history', '.albums-intro', '#side-a'];
    const getState = () => {
      const els = SELECTORS.map(s => document.querySelector(s));
      if (els.some(el => !el)) return null;
      const tops = els.map(el => Math.max(0, el.offsetTop - 60));
      let currentIdx = 0, bestDist = Infinity;
      for (let i = 0; i < tops.length; i++) {
        const d = Math.abs(window.scrollY - tops[i]);
        if (d < bestDist) { currentIdx = i; bestDist = d; }
      }
      return { tops, currentIdx, bestDist };
    };
    const resetGesture = () => {
      if (gestureTimer) clearTimeout(gestureTimer);
      gestureActive = false;
      gestureTimer = null;
      gestureStarted = 0;
    };
    const armIdle = () => {
      if (gestureTimer) clearTimeout(gestureTimer);
      gestureTimer = setTimeout(resetGesture, 240);
    };
    const onWheel = (e) => {
      // While a gesture is in flight (initial scroll + inertia tail), eat everything
      // briefly, then release even if the browser keeps sending tiny wheel events.
      if (gestureActive) {
        if (Date.now() - gestureStarted < 850) {
          e.preventDefault();
          armIdle();
          return;
        }
        resetGesture();
      }
      const s = getState();
      if (!s || s.bestDist > 140) return;
      const dir = e.deltaY > 0 ? 1 : -1;
      const nextIdx = s.currentIdx + dir;
      if (nextIdx < 0 || nextIdx >= s.tops.length) return;
      e.preventDefault();
      window.scrollTo({ top: s.tops[nextIdx], behavior: 'smooth' });
      gestureActive = true;
      gestureStarted = Date.now();
      armIdle();
    };
    const onKey = (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return;
      const isDown = e.key === 'ArrowDown' || e.key === 'PageDown';
      const isUp = e.key === 'ArrowUp' || e.key === 'PageUp';
      if (!isDown && !isUp) return;
      const now = Date.now();
      // Keys have their own throttle, completely independent of wheel state.
      if (now - keyLastTime < 320) { e.preventDefault(); return; }
      const s = getState();
      if (!s || s.bestDist > 140) return;
      const dir = isDown ? 1 : -1;
      const nextIdx = s.currentIdx + dir;
      if (nextIdx < 0 || nextIdx >= s.tops.length) return;
      e.preventDefault();
      keyLastTime = now;
      window.scrollTo({ top: s.tops[nextIdx], behavior: 'smooth' });
    };
    window.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKey);
    return () => {
      window.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
      resetGesture();
    };
  }, []);

  const stopAll = () => {
    const a = audioRef.current;
    if (a) { a.onerror = null; a.pause(); a.currentTime = 0; }
    playingRef.current = '';
    setPlaying('');
  };

  const onToggle = async (key, url, fallbackUrl = '') => {
    if (!url || !audioRef.current) return;
    const a = audioRef.current;
    if (playingRef.current === key) { a.onerror = null; a.pause(); setPlayingSync(''); return; }
    const sources = [url, fallbackUrl].filter((src, i, arr) => src && arr.indexOf(src) === i);
    let sourceIdx = 0;
    const playSource = async () => {
      const src = sources[sourceIdx];
      if (!src) { setPlayingSync(''); return; }
      a.onerror = () => {
        if (playingRef.current !== key) return;
        sourceIdx += 1;
        playSource();
      };
      try {
        a.pause();
        a.currentTime = 0;
        a.src = src;
        await a.play();
        setPlayingSync(key);
      } catch(e) {
        sourceIdx += 1;
        if (sourceIdx < sources.length) await playSource();
        else setPlayingSync('');
      }
    };
    setPlayingSync(key);
    await playSource();
  };

  const setMapLabelsVisible = (visible) => {
    labelsRef.current.forEach(label => label.setOpacity(visible ? 1 : 0));
  };

  const goToPin = (i) => {
    const pin = PINS[i];
    pinIdxRef.current = i;
    setPinIdx(i);
    setLocPanel(pin);
    setMapLabelsVisible(false);
    const map = mapRef.current;
    if (!map) return;
    map.closePopup();
    markersRef.current.forEach(m => { m.closePopup(); m.setStyle({ opacity:0, fillOpacity:0 }); });
    map.flyTo([pin.lat,pin.lng], 15, { duration:1.2, easeLinearity:0.25 });
    map.once('moveend', () => {
      markersRef.current.forEach(m => m.setStyle({ opacity:1, fillOpacity:0.85 }));
      if (markersRef.current[i]) markersRef.current[i].openPopup();
    });
  };

  // Overview after the last pin: zoom out to fit all five locations in the frame.
  const showOverview = () => {
    pinIdxRef.current = PINS.length;
    setPinIdx(PINS.length);
    setLocPanel({ overview: true });
    setMapLabelsVisible(false);
    const map = mapRef.current;
    if (!map) return;
    map.closePopup();
    markersRef.current.forEach(m => { m.closePopup(); m.setStyle({ opacity:1, fillOpacity:0.85 }); });
    const bounds = L.latLngBounds(PINS.map(p => [p.lat, p.lng]));
    map.flyToBounds(bounds, { duration:1.6, easeLinearity:0.25, padding:[60,60] });
    map.once('moveend', () => setMapLabelsVisible(true));
  };

  useEffect(() => {
    let completed = false;
    let animating = false;
    const lock   = () => { document.body.style.overflow='hidden'; scrollLocked.current=true; };
    const unlock = () => { document.body.style.overflow='';       scrollLocked.current=false; };

    const advance = (dir) => {
      if (animating) return;
      const next = pinIdxRef.current + dir;
      if (next < 0) { unlock(); return; }
      if (next < PINS.length) {
        animating = true;
        goToPin(next);
        if (mapRef.current) mapRef.current.once('moveend', () => { animating = false; });
        else setTimeout(() => { animating = false; }, 1400);
        return;
      }
      if (next === PINS.length) {
        // After the last pin, zoom out so all five points are visible.
        animating = true;
        showOverview();
        if (mapRef.current) mapRef.current.once('moveend', () => { animating = false; });
        else setTimeout(() => { animating = false; }, 1700);
        return;
      }
      // Past the overview: release scroll, let the user continue down the page.
      completed = true; unlock();
    };

    const onWheel = (e) => {
      const wrap = mapWrapRef.current;
      // Not yet locked: engage ONLY on real user wheel input (so programmatic
      // smooth-scrolls from the hero cards / nav don't get hijacked by the map).
      if (!scrollLocked.current) {
        if (completed || pinIdxRef.current !== -1 || !wrap) return;
        const rect = wrap.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        if (Math.abs(mid - window.innerHeight * 0.5) < rect.height * 0.4) {
          e.preventDefault(); e.stopPropagation();
          lock();
          window.scrollTo({ top: wrap.offsetTop - 60, behavior:'smooth' });
          setTimeout(() => goToPin(0), 400);
        }
        return;
      }
      // Locked: each wheel tick steps through the pins.
      e.preventDefault(); e.stopPropagation();
      if (animating) return;
      advance(e.deltaY > 0 ? 1 : -1);
    };

    const onScroll = () => {
      const wrap = mapWrapRef.current;
      if (!wrap) return;
      const rect = wrap.getBoundingClientRect();
      // Reset once the user has fully passed the map after completion.
      if (completed && rect.bottom < 0) {
        completed = false; animating = false;
        setMapLabelsVisible(false);
        setPinIdx(-1); pinIdxRef.current = -1; setLocPanel(null);
      }
    };

    // Arrow / Page keys mirror the wheel behavior so keyboard users get the same
    // map experience: engage when the map is centered, then step through pins.
    const onKey = (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return;
      const isDown = e.key === 'ArrowDown' || e.key === 'PageDown';
      const isUp = e.key === 'ArrowUp' || e.key === 'PageUp';
      if (!isDown && !isUp) return;
      const wrap = mapWrapRef.current;
      if (!scrollLocked.current) {
        if (completed || pinIdxRef.current !== -1 || !wrap) return;
        const rect = wrap.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        if (Math.abs(mid - window.innerHeight * 0.5) < rect.height * 0.4) {
          e.preventDefault(); e.stopPropagation();
          lock();
          window.scrollTo({ top: wrap.offsetTop - 60, behavior:'smooth' });
          setTimeout(() => goToPin(0), 400);
        }
        return;
      }
      e.preventDefault(); e.stopPropagation();
      if (animating) return;
      advance(isDown ? 1 : -1);
    };

    window.addEventListener('scroll', onScroll, { passive:true });
    document.addEventListener('wheel',  onWheel,  { passive:false, capture:true });
    document.addEventListener('keydown', onKey,   { capture:true });
    return () => {
      window.removeEventListener('scroll', onScroll);
      document.removeEventListener('wheel', onWheel, { capture:true });
      document.removeEventListener('keydown', onKey, { capture:true });
      unlock();
    };
  }, []);

  const scrollTo = id => { const el=document.getElementById(id); if(el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'}); };
  const playbackMeta = getPlaybackMeta(playing);
  const showNowPlaying = playing && !playing.startsWith('cortex-motif-');
  const mapCounterLabel = pinIdx === PINS.length ? 'All 5' : (pinIdx >= 0 ? (pinIdx + 1) + ' / ' + PINS.length : '— / ' + PINS.length);

  return (
    <>
      <div className="scroll-progress" aria-hidden="true" />
      <Nav />

      <section className="hero hero-narrow">
        <div>
          <div className="hero-kicker">HUM 2020 · Album Continuity · By Alexander Anzivino</div>
          <div className="hero-magnum">A Magnum Opus</div>
          <div className="hero-title">ALBUM<br />CONTINUITY</div>
          <hr className="hero-rule" />
          <p className="hero-thesis">How does a long piece of music feel like one thing instead of a pile of separate parts? That question runs through chant, polyphony, sonata form, and the LP. This project follows it into two albums that answer it in completely different ways.</p>
        </div>
      </section>

      <HistoryTimeline playing={playing} onToggle={onToggle} />

      <section className="albums-intro">
        <div className="albums-intro-eye">The Two Records</div>
        <div className="albums-intro-title">Two albums, fifty years apart, trying to solve the same problem.</div>
        <div className="hero-cards">
          <div className="hero-card a" onClick={() => scrollTo('side-a')}>
            <div className="hero-card-art"><img src={ART_GKMC} alt="good kid, m.A.A.d city album cover" loading="lazy" /></div>
            <div className="hero-card-body">
              <div className="hero-card-eye">Side A · Story Continuity</div>
              <a className="hero-card-title" href="https://open.spotify.com/album/6PBZN8cbwkqm1ERj2BGXJ1" target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}>good kid,<br />m.A.A.d city</a>
              <div className="hero-card-sub">Kendrick Lamar · 2012 · Compton, CA</div>
            </div>
            <div className="hero-card-arrow">↓</div>
          </div>
          <div className="hero-card b" onClick={() => scrollTo('side-b')}>
            <div className="hero-card-art"><img src={ART_TROUPEAU} alt="Troupeau Bleu album cover" loading="lazy" /></div>
            <div className="hero-card-body">
              <div className="hero-card-eye">Side B · Sound Continuity</div>
              <a className="hero-card-title" href="https://open.spotify.com/album/74DOWHisu2jlFvPid9YTGB" target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}>Troupeau Bleu</a>
              <div className="hero-card-sub">Cortex · 1975 · Paris, France</div>
            </div>
            <div className="hero-card-arrow">↓</div>
          </div>
        </div>
      </section>

      <section id="side-a">
        <div className="sec-head">
          <div className="sec-title a">good kid,<br />m.A.A.d city</div>
          <div className="sec-right">
            <span className="sec-label">Side A · Story Continuity</span>
            <span className="sec-meta">Kendrick Lamar · Compton, CA · 2012</span>
            <a className="spotify-link a" href="https://open.spotify.com/album/6PBZN8cbwkqm1ERj2BGXJ1" target="_blank" rel="noopener">♫ Full Album</a>
          </div>
        </div>
        <div className="editorial">
          <div className="ed-intro">
            <div className="ed-intro-label">Track by Track — Chain Reaction</div>
            <div className="ed-intro-text">Continuity here is causal: each track happens because of the one before it. The album follows one day in Compton, where one choice keeps leading to the next. Open a track to see how the chain moves.</div>
          </div>

          <button className="char-toggle" onClick={() => setCharOpen(o=>!o)}>
            <div>
              <div className="char-toggle-title">Who's In The Story</div>
              <div className="char-toggle-sub">The voices pulling the day forward</div>
            </div>
            <div className="char-toggle-mark">{charOpen?'−':'+'}</div>
          </button>
          {charOpen && (
            <div className="char-list">
              {CHARS.map(c => (
                <div key={c.name} className="char-row">
                  <div><div className="char-name">{c.name}</div><div className="char-role">{c.role}</div></div>
                  <div className="char-desc">{c.desc}</div>
                </div>
              ))}
            </div>
          )}

          {STAGES.map((stage,si) => (
            <div key={stage.id}>
              <div className="stage-divider">
                <span className="stage-divider-num">{String(si+1).padStart(2,'0')}</span>
                <span className="stage-divider-name">{stage.label}</span>
                <div className="stage-divider-line" />
              </div>
              {stage.tracks.map(t => <TrackRow key={t.num} track={t} badge={stage.label} playing={playing} onToggle={onToggle} />)}
            </div>
          ))}

          <VoicemailLog playing={playing} onToggle={onToggle} />

          <div className="map-chapter">
            <button className="map-chapter-head map-chapter-toggle" onClick={() => { setAtlasOpen(o => !o); if (atlasOpen) { setLocPanel(null); setPinIdx(-1); pinIdxRef.current = -1; setMapLabelsVisible(false); } }}>
              <div>
                <div className="map-chapter-title">Compton Atlas</div>
                <div className="map-chapter-sub">Where the story happens</div>
              </div>
              <div className="map-chapter-mark">{atlasOpen ? '−' : '+'}</div>
            </button>
            {atlasOpen && (
              <>
                <div ref={mapWrapRef} style={{position:'relative'}}>
                  <MapView
                    onPin={pin => { setMapLabelsVisible(false); setLocPanel(pin); setPinIdx(PINS.findIndex(p=>p.id===pin.id)); }}
                    activeLoc={locPanel}
                    onReady={m => { mapRef.current = m; }}
                    onMarkersReady={m => { markersRef.current = m; }}
                    onLabelsReady={m => { labelsRef.current = m; }}
                    panelOpenRef={panelOpenRef}
                  />
                  <div style={{...OVERLAY_STYLE, bottom:28, left:'50%', transform:'translateX(-50%)'}}>
                    <button style={{...OBTN,color:'rgba(255,255,255,0.5)'}} onClick={() => goToPin(pinIdx<=0?PINS.length-1:pinIdx-1)}>← Back</button>
                    <div style={ODIV} />
                    <span style={{fontFamily:'DM Mono,monospace',fontSize:'9px',color:'rgba(255,255,255,0.3)',minWidth:46,textAlign:'center',padding:'0 4px'}}>{mapCounterLabel}</span>
                    <div style={ODIV} />
                    <button style={{...OBTN,color:'rgba(255,255,255,0.5)'}} onClick={() => goToPin(pinIdx>=PINS.length-1||pinIdx===-1?0:pinIdx+1)}>Next →</button>
                  </div>
                </div>
                {locPanel ? (
                  locPanel.overview ? (
                    <div className="loc-panel">
                      <div className="loc-n">5</div>
                      <div>
                        <div className="loc-name">All Five Locations</div>
                        <div className="loc-track">The full geography of one day</div>
                        <div className="loc-body">Rosecrans → Gonzales Park → Louis Burgers → Sherane's side → Central Compton. What starts as a drive to see a girl turns into a map of the whole album.</div>
                        <button style={{marginTop:12,fontSize:'0.65em',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--muted)',background:'none',border:'none',fontFamily:'var(--font-u)',cursor:'pointer'}} onClick={() => { setMapLabelsVisible(false); setLocPanel(null); setPinIdx(-1); pinIdxRef.current = -1; }}>Close ×</button>
                      </div>
                    </div>
                  ) : (
                    <div className="loc-panel">
                      <div className="loc-n">{String(locPanel.trackNum).padStart(2,'0')}</div>
                      <div>
                        <div className="loc-name">{locPanel.name}</div>
                        <div className="loc-track">Track {String(locPanel.trackNum).padStart(2,'0')} — {locPanel.trackSong}</div>
                        <div className="loc-body">{locPanel.body}</div>
                        <button style={{marginTop:12,fontSize:'0.65em',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--muted)',background:'none',border:'none',fontFamily:'var(--font-u)',cursor:'pointer'}} onClick={() => { setMapLabelsVisible(false); setLocPanel(null); setPinIdx(-1); pinIdxRef.current = -1; }}>Close ×</button>
                      </div>
                    </div>
                  )
                ) : (
                  <div className="loc-hint">Pick a pin or use the arrows to follow the route</div>
                )}
              </>
            )}
          </div>
        </div>
      </section>

      <section id="side-b" style={{borderTop:'1px solid var(--rule)'}}>
        <div className="sec-head">
          <div className="sec-title b">Troupeau Bleu</div>
          <div className="sec-right">
            <span className="sec-label">Side B · Sound Continuity</span>
            <span className="sec-meta">Cortex · Paris · 1975</span>
            <a className="spotify-link b" href="https://open.spotify.com/album/74DOWHisu2jlFvPid9YTGB" target="_blank" rel="noopener">♫ Find on Spotify</a>
          </div>
        </div>
        <div className="ed-intro" style={{padding:'32px 40px 24px'}}>
          <div className="ed-intro-text">This album does not move forward so much as sink deeper in. Its continuity comes from staying inside the same sound world until every track feels related.</div>
        </div>
        <div className="framework">
          {FRAMEWORK.sonic.map(el => (
            <div key={el.lbl} className="fw-cell">
              <div className="fw-label">{el.lbl}</div>
              <div className="fw-desc">{el.desc}</div>
            </div>
          ))}
        </div>
        <MotifMatrix playing={playing} onToggle={onToggle} />
        <div style={{padding:'24px 40px 8px'}}>
          <div className="ed-intro-label">Key Tracks — open a track, or use the title for Spotify</div>
        </div>
        {CORTEX.map(t => <CortexRow key={t.num} track={t} playing={playing} onToggle={onToggle} />)}
        <SampleLineage playing={playing} onToggle={onToggle} />
      </section>

      <section id="bridge" style={{borderTop:'1px solid var(--rule)'}} className="bridge">
        <div className="bridge-kicker">Final Take</div>
        <div className="bridge-title">Two Approaches,<br />One Goal</div>
        <p className="bridge-body">One album holds together because each event causes the next. The other holds together because sounds keep returning, deepening the atmosphere. Both show how music can move through time without losing itself.</p>
        <div className="bridge-cols">
          <div className="b-col-a">
            <div className="bridge-col-eye">Side A</div>
            <div className="bridge-col-title">good kid, m.A.A.d city</div>
            <div className="bridge-col-mode">Story is the thread</div>
            {FRAMEWORK.narrative.map(el => (
              <div key={el.lbl} className="bridge-el">
                <div className="bridge-el-lbl">{el.lbl}</div>
                <div className="bridge-el-desc">{el.desc}</div>
              </div>
            ))}
          </div>
          <div className="bridge-divider" />
          <div className="b-col-b">
            <div className="bridge-col-eye">Side B</div>
            <div className="bridge-col-title">Troupeau Bleu</div>
            <div className="bridge-col-mode">Sound is the thread</div>
            {FRAMEWORK.sonic.map(el => (
              <div key={el.lbl} className="bridge-el">
                <div className="bridge-el-lbl">{el.lbl}</div>
                <div className="bridge-el-desc">{el.desc}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="bridge-coda">
          <div className="bridge-coda-title">Why They Hold Together</div>
          <div className="bridge-coda-body">Kendrick gives you a plot you can follow. Cortex gives you a room you keep reentering. Different methods, same kind of focus.</div>
        </div>
        <p className="bridge-body" style={{marginBottom:0}}>Across a thousand years, the methods change. The hope stays the same: make time feel whole.</p>
      </section>

      <A11y />
      {showNowPlaying && (
        <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',zIndex:9999,display:'flex',alignItems:'center',gap:12,background:playbackMeta.theme.bg,border:'1px solid '+playbackMeta.theme.border,borderRadius:6,padding:'8px 16px',backdropFilter:'blur(12px)',maxWidth:'90vw'}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:playbackMeta.theme.accent,flexShrink:0,animation:'pulse 1.2s infinite'}} />
          <span style={{fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',color:playbackMeta.theme.label,fontFamily:'Space Grotesk,sans-serif',flexShrink:0}}>Now Playing</span>
          <span style={{fontFamily:'Cormorant Garamond,Georgia,serif',fontStyle:'italic',fontSize:'13px',color:playbackMeta.theme.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:300}}>
            {playbackMeta.title}
          </span>
          <button onClick={stopAll} style={{fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',padding:'5px 10px',background:'transparent',color:playbackMeta.theme.accent,cursor:'pointer',fontFamily:'Space Grotesk,sans-serif',border:'1px solid '+playbackMeta.theme.border,borderRadius:3,flexShrink:0}}>■ Stop</button>
        </div>
      )}
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Custom cursor -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<script>
(function () {
  var dot  = document.getElementById('cur-dot');
  var ring = document.getElementById('cur-ring');
  var body = document.body;

  var mx = window.innerWidth / 2, my = window.innerHeight / 2;
  var rx = mx, ry = my;
  var raf;

  /* Smooth ring follows mouse with spring-like lag */
  function loop() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    dot.style.transform  = 'translate3d(calc(' + mx + 'px - 50%), calc(' + my + 'px - 50%), 0)';
    ring.style.transform = 'translate3d(calc(' + rx + 'px - 50%), calc(' + ry + 'px - 50%), 0)';
    raf = requestAnimationFrame(loop);
  }
  raf = requestAnimationFrame(loop);

  document.addEventListener('mousemove', function (e) {
    mx = e.clientX; my = e.clientY;
    body.classList.remove('cur-out');
  });

  document.addEventListener('mouseleave', function () { body.classList.add('cur-out'); });

  /* Classify the element under cursor */
  var interactiveSelectors = 'a, button, [role="button"], input, select, textarea, label, .hero-card, .track-top, .cortex-top, .mot-btn, .vm-toggle, .char-toggle, .map-chapter-toggle, .history-node';
  var textSelectors        = 'p, li, .bridge-body, .bridge-coda-body, .ed-intro-text, .track-analysis, .cortex-full, .vm-text, .vm-note';
  var amberSelectors       = '#side-a, .hero-card.a, .track-top, .char-toggle, .spotify-link.a';
  var blueSelectors        = '#side-b, .hero-card.b, .cortex-top, .lineage-card, .spotify-link.b';

  function classify(el) {
    body.classList.remove('cur-hover', 'cur-a', 'cur-b', 'cur-text');
    if (!el) return;
    var isInteract = el.closest(interactiveSelectors);
    var isText     = !isInteract && el.closest(textSelectors);
    if (isInteract) {
      body.classList.add('cur-hover');
      if (el.closest(amberSelectors)) body.classList.add('cur-a');
      else if (el.closest(blueSelectors)) body.classList.add('cur-b');
    } else if (isText) {
      body.classList.add('cur-text');
    }
  }

  document.addEventListener('mouseover',  function (e) { classify(e.target); });
  document.addEventListener('mousedown',  function ()  { body.classList.add('cur-down'); });
  document.addEventListener('mouseup',    function ()  { body.classList.remove('cur-down'); });
})();
</script>
</body>
